name: tests

on:
  push:
    branches:
      - master
  pull_request:

permissions: {}

jobs:
  unit-tests:
    name: Run unit tests

    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: false
          check-latest: true

      - name: Run Go tests
        run: make test
